# Safe Codex CLI preferences managed by kt-aicoding/cc-codex-config.
# Secrets, provider tokens, project trust entries, and machine-local paths do not belong here.

model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_verbosity = "medium"
review_model = "gpt-5.5"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
check_for_update_on_startup = false
project_doc_fallback_filenames = ["CLAUDE.md", "README.md"]
project_doc_max_bytes = 100000
tool_output_token_limit = 40000

[tui]
status_line = [
  "model-with-reasoning",
  "context-used",
  "five-hour-limit",
  "weekly-limit",
  "git-branch",
]
status_line_use_colors = true

[history]
persistence = "save-all"
max_bytes = 10485760

[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = true
exclude_tmpdir_env_var = true

[shell_environment_policy]
inherit = "all"
exclude = ["*TOKEN*", "*SECRET*", "*KEY*", "*PASSWORD*", "*password*"]

[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

[plugins."vercel@openai-curated"]
enabled = true

[plugins."supabase@openai-curated"]
enabled = true

[plugins."build-web-apps@openai-curated"]
enabled = true

[plugins."expo@openai-curated"]
enabled = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest", "--headless"]
